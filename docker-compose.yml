version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: helpdesk-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: helpdesk-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-realm-export.json:/opt/keycloak/data/import/realm.json

  # ──────────────────────────────────────────────────────────────────────
  # LiveKit Server — Self-hosted WebRTC media router (air-gapped)
  # Ports:
  #   7880 — HTTP / WebSocket (Python SDK + browser livekit-client connect here)
  #   7881 — TCP fallback for WebRTC (when UDP is blocked)
  #   7882 — UDP (WebRTC media traffic — primary path)
  # ──────────────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: helpdesk-livekit
    command: --config /etc/livekit/config.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit-config.yaml:/etc/livekit/config.yaml
    restart: unless-stopped

volumes:
  postgres_data:
